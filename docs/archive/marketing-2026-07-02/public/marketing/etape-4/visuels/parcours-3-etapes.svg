<svg viewBox="0 0 1600 900" fill="none" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="60" x2="1460" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B132B" />
      <stop offset="1" stop-color="#143A5A" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <text x="140" y="170" fill="#BAE6FD" font-size="26" font-family="Arial, sans-serif" letter-spacing="2">
