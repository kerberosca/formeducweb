  <text x="1115" y="390" fill="#EDE9FE" font-size="28" font-family="Arial, sans-serif">ETAPE 3</text>
  <text x="1115" y="445" fill="#FFFFFF" font-size="44" font-weight="700" font-family="Arial, sans-serif">Implantation</text>
  <text x="1115" y="500" fill="#DDD6FE" font-size="22" font-family="Arial, sans-serif">
