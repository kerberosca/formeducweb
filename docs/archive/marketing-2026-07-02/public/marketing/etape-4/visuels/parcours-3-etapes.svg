  </text>

  <rect x="130" y="320" width="400" height="350" rx="28" fill="#082F49" stroke="#38BDF8" />
  <rect x="600" y="320" width="400" height="350" rx="28" fill="#134E4A" stroke="#2DD4BF" />
  <rect x="1070" y="320" width="400" height="350" rx="28" fill="#4C1D95" stroke="#A78BFA" />

  <text x="175" y="390" fill="#E0F2FE" font-size="28" font-family="Arial, sans-serif">ETAPE 1</text>
  <text x="175" y="445" fill="#FFFFFF" font-size="44" font-weight="700" font-family="Arial, sans-serif">Diagnostic</text>
  <text x="175" y="500" fill="#BAE6FD" font-size="24" font-family="Arial, sans-serif">
    <tspan x="175" dy="0">Auto-evaluation</tspan>
    <tspan x="175" dy="34">rapide</tspan>
  </text>

  <text x="645" y="390" fill="#CCFBF1" font-size="28" font-family="Arial, sans-serif">ETAPE 2</text>
  <text x="645" y="445" fill="#FFFFFF" font-size="44" font-weight="700" font-family="Arial, sans-serif">Rapport</text>
  <text x="645" y="500" fill="#99F6E4" font-size="24" font-family="Arial, sans-serif">
