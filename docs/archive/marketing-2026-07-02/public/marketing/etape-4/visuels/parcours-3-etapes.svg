  </text>

  <path d="M530 495 L585 495" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" />
  <path d="M1000 495 L1055 495" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" />
